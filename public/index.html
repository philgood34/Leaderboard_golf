<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#1a4d2e">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Leaderboard Golf - Herault</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <h1>
    <svg class="pin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path class="flag-anim" d="M5 21V4l11 4-11 4" fill="#c9a961" stroke="#1a4d2e"/>
      <line x1="5" y1="4" x2="5" y2="22" stroke="#1a4d2e" stroke-linecap="round"/>
      <circle cx="5" cy="22" r="1.5" fill="#1a4d2e"/>
    </svg>
    Leaderboard Golf
  </h1>

  <div id="loading" class="card cream center muted">Chargement du club-house...</div>

  <div id="active-block" class="card" style="display:none">
    <h2>Partie en cours</h2>
    <div id="active-info" style="margin-bottom:14px"></div>
    <a id="join-btn" class="button-link gold" href="/game.html">Rejoindre la partie</a>
    <button id="new-btn" class="secondary" style="margin-top:10px">Demarrer une nouvelle partie</button>
  </div>

  <div id="empty-block" class="card cream" style="display:none">
    <div class="empty-state">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="12" cy="12" r="9"/>
        <circle cx="9" cy="10" r="0.8" fill="currentColor"/>
        <circle cx="15" cy="10" r="0.8" fill="currentColor"/>
        <circle cx="12" cy="13" r="0.8" fill="currentColor"/>
        <circle cx="10" cy="15" r="0.8" fill="currentColor"/>
        <circle cx="14" cy="15" r="0.8" fill="currentColor"/>
      </svg>
      <p class="muted">Aucune partie en cours.<br>Pret a tirer le premier coup ?</p>
    </div>
    <a class="button-link" href="/setup.html">Creer une partie</a>
  </div>

  <a class="button-link secondary" href="/history.html" style="margin-top:14px">
    Historique des parties
  </a>

  <script>
    async function init() {
      const res = await fetch('/api/games/active/exists');
      const meta = await res.json();
      document.getElementById('loading').style.display = 'none';

      if (meta.exists) {
        const block = document.getElementById('active-block');
        block.style.display = 'block';
        // Tenter de charger les details (sans code on aura un 401 sauf si on l'a en localStorage)
        const code = localStorage.getItem('game_code_' + meta.id);
        let detail = null;
        if (code) {
          const r = await fetch('/api/games/' + meta.id, { headers: { 'X-Game-Code': code } });
          if (r.ok) detail = await r.json();
        }
        if (detail) {
          const status = detail.game.status === 'setup' ? 'En configuration' : 'En cours';
          document.getElementById('active-info').innerHTML = `
            <div style="font-family:Georgia,serif;font-size:18px;color:#1a4d2e;font-weight:700">${escapeHtml(detail.course.name)}</div>
            <div style="margin-top:6px">
              <span class="tag primary">${escapeHtml(detail.formulaLabel)}</span>
              <span class="tag">${detail.course.holes.length} trous</span>
              <span class="tag">Par ${detail.course.par_total}</span>
              <span class="tag gold">${detail.players.length} joueur${detail.players.length > 1 ? 's' : ''}</span>
              <span class="tag">${status}</span>
            </div>
          `;
          if (detail.game.status === 'setup') {
            document.getElementById('join-btn').textContent = 'Continuer la configuration';
            document.getElementById('join-btn').href = '/setup.html';
          }
        } else {
          document.getElementById('active-info').innerHTML = `
            <p class="muted">Une partie est en cours mais tu dois entrer le code pour la rejoindre.</p>
          `;
        }
        document.getElementById('new-btn').addEventListener('click', () => {
          if (confirm('La partie en cours sera cloturee. Continuer ?')) {
            location.href = '/setup.html?reset=1';
          }
        });
      } else {
        document.getElementById('empty-block').style.display = 'block';
      }
    }
    function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);}
    init();
  </script>
</body>
</html>
