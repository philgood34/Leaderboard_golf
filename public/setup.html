<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#1a4d2e">
  <title>Configurer la partie - Leaderboard Golf</title>
  <link rel="stylesheet" href="/style.css">
  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
  <style>
    /* Badges couleur equipes */
    .team-badge {
      display:inline-block; padding:2px 10px; border-radius:12px;
      font-size:12px; font-weight:700; color:#fff;
      vertical-align:middle;
    }
    .team-badge.team-rouge { background:#c0392b }
    .team-badge.team-bleu  { background:#2c5aa0 }
    .team-badge.team-vert  { background:#27ae60 }
    .team-badge.team-jaune { background:#d4a017; color:#1a2419 }
    .team-row {
      display:flex; align-items:center; gap:10px; padding:8px 10px;
      background:#faf6e9; border-radius:6px; margin-bottom:6px;
    }
    .team-row .team-name { flex:1; font-weight:600 }
    .pair-warn {
      background:#fee; color:#c0392b; padding:6px 10px; border-radius:4px;
      font-size:12px; margin-top:6px;
    }
    /* Modal de selection (sheet picker) — meme style que score-picker dans game.html */
    .score-picker-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:200;
      display:flex; align-items:center; justify-content:center;
    }
    .score-picker {
      background:#fff; border-radius:14px; padding:14px;
      width:280px; max-height:80vh;
      display:flex; flex-direction:column; box-shadow:0 8px 32px rgba(0,0,0,0.3);
    }
    .score-picker .header {
      text-align:center; font-family:Georgia,serif; font-weight:700;
      color:#1a4d2e; padding:0 0 10px; border-bottom:2px solid #c9a961;
      font-size:15px;
    }
    .score-picker .header .sub { font-size:12px; color:#6b6b6b; font-weight:400; margin-top:2px }
    .score-picker-list {
      overflow-y:auto; flex:1; min-height:60px; max-height:50vh;
      padding:6px 0;
    }
    .score-picker-list button {
      display:block; width:100%; padding:12px; font-size:15px; font-weight:600;
      border:1px solid #d4c896; background:#faf6e9; cursor:pointer; color:#1a2419;
      transition:background 0.1s; font-family:inherit; margin-bottom:6px; border-radius:6px;
    }
    .score-picker-list button:hover { background:#c9a961; color:#fff }
    .score-picker .clear {
      margin-top:8px; padding:10px; border:1px solid #ddd; background:#faf6e9;
      border-radius:6px; cursor:pointer; font-size:13px; color:#6b2a2a;
      font-family:inherit;
    }
    .score-picker .clear:hover { background:#fff3e0 }
    /* Cards de match (formule match_team) */
    .setup-match-card {
      border:1px solid #d4c896; border-radius:8px; padding:10px 12px;
      margin-bottom:10px; background:#fff;
    }
    .setup-match-card.invalid { border-color:#c0392b; background:#fef5f4 }
    .setup-match-card .match-num {
      font-size:11px; text-transform:uppercase; letter-spacing:0.5px;
      color:#1a4d2e; font-weight:700; margin-bottom:6px;
    }
    .setup-match-card .player-line {
      display:flex; align-items:center; gap:8px; padding:6px 0;
      border-top:1px dashed #e8e0c8;
    }
    .setup-match-card .player-line:first-of-type { border-top:none }
    .setup-match-card .pl-pos { font-family:Georgia,serif; color:#1a4d2e; font-weight:700; min-width:24px }
    .setup-match-card .pl-name { flex:1; font-weight:600 }
    .setup-match-card .pl-meta { font-size:11px; color:#6b6b6b }
    .setup-match-card .pl-actions { white-space:nowrap }
  </style>
</head>
<body>
  <h1>
    <svg class="pin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path class="flag-anim" d="M5 21V4l11 4-11 4" fill="#c9a961" stroke="#1a4d2e"/>
      <line x1="5" y1="4" x2="5" y2="22" stroke="#1a4d2e" stroke-linecap="round"/>
      <circle cx="5" cy="22" r="1.5" fill="#1a4d2e"/>
    </svg>
    Departs
  </h1>

  <div id="step-create" class="card">
    <h2>1. Choix du parcours</h2>
    <div id="course-list"></div>

    <div id="loop-twice-row" style="display:none; margin-top:12px">
      <label style="display:flex;align-items:center;gap:10px;cursor:pointer;text-transform:none;letter-spacing:0">
        <input type="checkbox" id="loop-twice" style="width:auto;flex:0;transform:scale(1.4)">
        <span>Jouer en 18 trous (deux tours du parcours)</span>
      </label>
    </div>

    <h2 style="margin-top:20px">2. Formule de jeu</h2>
    <select id="formula-select">
      <option value="stroke" selected>Stroke Play</option>
      <option value="match_brut">Matchplay Brut</option>
      <option value="match_net">Matchplay Net</option>
      <option value="match_team">Match Play par equipes (Ryder)</option>
      <option value="chicago">Chicago</option>
    </select>

    <button id="create-btn" class="gold" style="margin-top:18px">Creer la partie</button>
  </div>

  <div id="step-code" class="card cream" style="display:none">
    <h2 style="margin-top:0">Code d'acces</h2>
    <div class="code-box">
      <div class="label">Code de la partie</div>
      <div class="code" id="code-display">----</div>
      <div class="hint">Partage ce code aux joueurs. Sans lui, impossible de rejoindre.</div>
      <button id="copy-code" class="secondary">Copier le code</button>
    </div>
  </div>

  <div id="step-players" class="card" style="display:none">
    <h2>Le flight</h2>

    <!-- Import depuis Excel (File System Access API, Chrome desktop) -->
    <div id="import-block" style="margin-bottom:14px;display:none">
      <button id="import-btn" class="secondary" style="width:100%">Configurer fichier import Excel</button>
      <div id="import-status" class="muted" style="font-size:12px;margin-top:6px;text-align:center"></div>
    </div>

    <!-- Section equipes : visible seulement pour match_team -->
    <div id="teams-block" style="display:none; margin-bottom:18px">
      <h2 style="margin-top:0">Equipes</h2>
      <div id="teams-list" style="margin-bottom:10px"></div>

      <div class="card cream" style="margin:0; padding:12px; border-left:none; box-shadow:none">
        <label>Nom de l'equipe</label>
        <input type="text" id="t-name" placeholder="Ex: Les Aigles" autocomplete="off" data-form-type="other" data-lpignore="true" data-1p-ignore="true" data-bwignore>
        <label>Couleur</label>
        <select id="t-color">
          <option value="rouge">Rouge</option>
          <option value="bleu">Bleu</option>
          <option value="vert">Vert</option>
          <option value="jaune">Jaune</option>
        </select>
        <button id="add-team-btn" style="margin-top:10px">Ajouter l'equipe</button>
        <div id="add-team-error" class="error"></div>
      </div>
    </div>

    <button id="auto-pair-btn" class="secondary" style="display:none;margin-bottom:10px;width:100%">Constituer les matchs automatiquement</button>
    <div id="players-list" style="margin-bottom:14px"></div>

    <div class="card cream" style="margin:0; padding: 14px; border-left: none; box-shadow: none">
      <h2 style="margin-top:0">Ajouter un joueur</h2>
      <label>Nom</label>
      <input type="text" id="p-name" name="player-display-name" placeholder="Prenom" autocomplete="off" data-form-type="other" data-lpignore="true" data-1p-ignore="true" data-bwignore>

      <label>Sexe</label>
      <select id="p-sex">
        <option value="M">Homme</option>
        <option value="F">Femme</option>
      </select>

      <label>Depart (couleur)</label>
      <select id="p-tee"></select>

      <div id="p-team-row" style="display:none">
        <label>Equipe</label>
        <select id="p-team"></select>
      </div>

      <label>Index (HCP)</label>
      <input type="number" id="p-hcp" step="0.1" placeholder="Ex: 18.4" inputmode="decimal">

      <button id="add-btn" style="margin-top:14px">Ajouter au flight</button>
      <div id="add-error" class="error"></div>
    </div>

    <button id="start-btn" class="gold" style="margin-top:18px">Au depart !</button>
  </div>

  <a href="/" class="button-link secondary" style="margin-top:14px">Retour au club-house</a>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    let gameId = null;
    let gameCode = null;
    let gameFormula = null;
    let courses = [];
    let selectedCourseId = null;
    let currentPlayers = []; // dernier etat des joueurs, utilise pour valider l'unicite du nom
    let currentTeams = [];   // dernier etat des equipes (formule match_team)

    function authHeaders() { return gameCode ? { 'X-Game-Code': gameCode } : {}; }

    async function loadCourses() {
      courses = await fetch('/api/courses').then(r => r.json());
      courses.sort((a, b) => {
        if (a.holes_count !== b.holes_count) return b.holes_count - a.holes_count;
        return a.name.localeCompare(b.name);
      });
      renderCourseList();
    }

    // Cherche le slope pour (sex, color preferee). Si absent, fallback sur le 1er tee
    // disponible pour ce sexe. Renvoie { color, slope } ou null si aucun tee dispo.
    function preferredTeeSlope(course, sex, preferred) {
      const tees = (course.tees || []).filter(t => t.sex === sex);
      if (!tees.length) return null;
      const exact = tees.find(t => t.color === preferred);
      const tee = exact || tees[0];
      return { color: tee.color, slope: tee.slope };
    }

    function renderCourseList() {
      const div = document.getElementById('course-list');
      div.innerHTML = courses.map(c => {
        const sel = c.id === selectedCourseId ? ' selected' : '';
        const teeH = preferredTeeSlope(c, 'M', 'jaune');
        const teeF = preferredTeeSlope(c, 'F', 'bleu');
        const slopeH = teeH ? `Slope H ${TEE_LABELS[teeH.color] || teeH.color} : ${teeH.slope}` : '';
        const slopeF = teeF ? `Slope F ${TEE_LABELS[teeF.color] || teeF.color} : ${teeF.slope}` : '';
        return `<div class="course-card${sel}" data-id="${c.id}" data-holes="${c.holes_count}">
          <div class="c-name">${escapeHtml(c.name)}</div>
          <div class="c-meta">
            <span class="tag">${escapeHtml(c.city || '')}</span>
            <span class="tag primary">${c.holes_count} trous</span>
            <span class="tag">Par ${c.par_total}</span>
            ${slopeH ? `<span class="tag">${slopeH}</span>` : ''}
            ${slopeF ? `<span class="tag">${slopeF}</span>` : ''}
          </div>
        </div>`;
      }).join('');
      div.querySelectorAll('.course-card').forEach(el => {
        el.addEventListener('click', () => {
          selectedCourseId = Number(el.dataset.id);
          renderCourseList();
          updateLoopTwiceVisibility();
        });
      });
      if (!selectedCourseId && courses[0]) {
        selectedCourseId = courses[0].id;
        renderCourseList();
        updateLoopTwiceVisibility();
      }
    }

    function updateLoopTwiceVisibility() {
      const c = courses.find(c => c.id === selectedCourseId);
      const row = document.getElementById('loop-twice-row');
      row.style.display = c && c.holes_count === 9 ? 'block' : 'none';
      if (c && c.holes_count !== 9) document.getElementById('loop-twice').checked = false;
    }

    async function checkExisting() {
      const url = new URL(location.href);
      const reset = url.searchParams.get('reset') === '1';
      if (reset) return;
      const meta = await fetch('/api/games/active/exists').then(r => r.json());
      // On autorise aussi les parties 'active' pour ajouter / retirer un joueur a chaud.
      if (meta.exists && (meta.status === 'setup' || meta.status === 'active')) {
        const code = localStorage.getItem('game_code_' + meta.id);
        if (!code) return;
        const r = await fetch('/api/games/' + meta.id, { headers: { 'X-Game-Code': code } });
        if (r.ok) {
          const data = await r.json();
          gameId = data.game.id;
          gameCode = code;
          showCodeStep();
          showPlayersStep(data);
        }
      }
    }

    document.getElementById('create-btn').addEventListener('click', async () => {
      if (!selectedCourseId) { alert('Choisis un parcours'); return; }
      const formula = document.getElementById('formula-select').value;
      const loop_twice = document.getElementById('loop-twice').checked ? 1 : 0;
      const res = await fetch('/api/games', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ course_id: selectedCourseId, formula, loop_twice })
      });
      const data = await res.json();
      if (!res.ok) { alert(data.error || 'Erreur'); return; }
      gameId = data.game.id;
      gameCode = data.code;
      localStorage.setItem('game_code_' + gameId, gameCode);
      showCodeStep();
      showPlayersStep(data);
    });

    function showCodeStep() {
      document.getElementById('step-create').style.display = 'none';
      document.getElementById('step-code').style.display = 'block';
      document.getElementById('code-display').textContent = gameCode;
    }

    document.getElementById('copy-code').addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(gameCode);
        document.getElementById('copy-code').textContent = 'Copie !';
        setTimeout(() => document.getElementById('copy-code').textContent = 'Copier le code', 1500);
      } catch (e) { alert('Code : ' + gameCode); }
    });

    function showPlayersStep(data) {
      gameFormula = data.game && data.game.formula;
      const isTeam = gameFormula === 'match_team';
      // S'assure que selectedCourseId pointe sur le parcours de la partie en cours
      if (data.game && data.game.course_id) selectedCourseId = data.game.course_id;
      refreshTeeSelect();
      // Affichage du bloc equipes uniquement pour match_team
      document.getElementById('teams-block').style.display = isTeam ? 'block' : 'none';
      document.getElementById('p-team-row').style.display  = isTeam ? 'block' : 'none';
      document.getElementById('auto-pair-btn').style.display = isTeam ? 'block' : 'none';
      document.getElementById('step-players').style.display = 'block';
      currentTeams = data.teams || [];
      renderTeams(currentTeams);
      refreshTeamSelect();
      renderPlayers(data.players || []);
      const sock = io();
      sock.emit('join', { gameId, code: gameCode });
      sock.on('game:update', d => {
        currentTeams = d.teams || [];
        renderTeams(currentTeams);
        refreshTeamSelect();
        renderPlayers(d.players);
      });
    }

    function renderTeams(teams) {
      const div = document.getElementById('teams-list');
      if (!teams.length) {
        div.innerHTML = '<p class="muted" style="font-size:13px;text-align:center;padding:6px 0">Aucune equipe. Ajoute au moins 2 equipes.</p>';
        return;
      }
      div.innerHTML = teams.map(t => `
        <div class="team-row">
          <span class="team-badge team-${t.color}">${escapeHtml(t.name)}</span>
          <span class="team-name muted">(${t.color})</span>
          <button class="small danger" data-del-team="${t.id}" title="Retirer cette equipe">×</button>
        </div>
      `).join('');
      div.querySelectorAll('[data-del-team]').forEach(b => b.addEventListener('click', async () => {
        if (!confirm("Supprimer cette equipe ? Les joueurs assignes seront desassigne.")) return;
        await fetch(`/api/games/${gameId}/teams/${b.dataset.delTeam}`, { method: 'DELETE', headers: authHeaders() });
      }));
    }

    // Rendu specifique match_team : chaque match dans une card visuellement separee
    function renderTeamMatchCards(div, players) {
      const findTeam = id => currentTeams.find(t => t.id === id);
      const teamBadge = p => {
        if (!p.team_id) return '<span class="muted" style="font-size:11px;color:#c0392b">sans equipe</span>';
        const t = findTeam(p.team_id);
        return t ? `<span class="team-badge team-${t.color}">${escapeHtml(t.name)}</span>` : '';
      };
      const sexLbl = p => p.sex === 'M' ? 'H' : 'F';
      const renderPlayerLine = (p, idx, total) => `
        <div class="player-line">
          <span class="pl-pos">${idx + 1}.</span>
          <span class="pl-name">${escapeHtml(p.name)}</span>
          ${teamBadge(p)}
          <span class="pl-meta">(${sexLbl(p)} &middot; ${p.handicap}/${p.playingHcp})</span>
          <span class="pl-actions">
            ${idx > 0 ? `<button class="small secondary" data-move="up" data-pid="${p.id}" title="Monter">↑</button>` : '<span style="display:inline-block;width:30px"></span>'}
            ${idx < total - 1 ? `<button class="small secondary" data-move="down" data-pid="${p.id}" title="Descendre">↓</button>` : '<span style="display:inline-block;width:30px"></span>'}
            <button class="small danger" data-del="${p.id}" title="Retirer">×</button>
          </span>
        </div>`;

      let html = '';
      const total = players.length;
      let i = 0;
      let matchNum = 1;
      while (i + 1 < total) {
        const p1 = players[i], p2 = players[i + 1];
        const sameTeam = p1.team_id && p2.team_id && p1.team_id === p2.team_id;
        const cls = sameTeam ? 'setup-match-card invalid' : 'setup-match-card';
        html += `<div class="${cls}">
          <div class="match-num">Match ${matchNum}</div>
          ${renderPlayerLine(p1, i, total)}
          ${renderPlayerLine(p2, i + 1, total)}
          ${sameTeam ? '<div class="pair-warn">⚠️ Meme equipe — utilise les fleches ou le bouton "Constituer les matchs"</div>' : ''}
        </div>`;
        i += 2;
        matchNum += 1;
      }
      // Joueur orphelin (nombre impair)
      if (i < total) {
        const p = players[i];
        html += `<div class="setup-match-card invalid">
          <div class="match-num">Sans adversaire</div>
          ${renderPlayerLine(p, i, total)}
          <div class="pair-warn">⚠️ Nombre impair de joueurs — ajoute ou retire un joueur</div>
        </div>`;
      }

      div.innerHTML = html;

      div.querySelectorAll('[data-del]').forEach(b => b.addEventListener('click', async () => {
        await fetch(`/api/games/${gameId}/players/${b.dataset.del}`, { method: 'DELETE', headers: authHeaders() });
      }));
      div.querySelectorAll('[data-move]').forEach(b => b.addEventListener('click', async () => {
        await fetch(`/api/games/${gameId}/players/${b.dataset.pid}/move`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', ...authHeaders() },
          body: JSON.stringify({ direction: b.dataset.move })
        });
      }));
    }

    // Auto-pair : reorganise les joueurs pour former des matchs cross-team
    // Heuristique : pour 2 equipes, trie chaque equipe par sexe (F d'abord) puis
    // par index croissant, puis zip. Pour 3+ equipes, alterne en round-robin.
    async function autoPairTeams() {
      if (currentTeams.length < 2) { alert('Au moins 2 equipes requises'); return; }
      const sortKey = (a, b) => {
        if (a.sex !== b.sex) return a.sex === 'F' ? -1 : 1;
        return Number(a.handicap) - Number(b.handicap);
      };
      // Groupe par equipe
      const byTeam = {};
      for (const t of currentTeams) byTeam[t.id] = [];
      for (const p of currentPlayers) {
        if (!p.team_id || !byTeam[p.team_id]) continue; // joueurs sans equipe : ignores
        byTeam[p.team_id].push(p);
      }
      for (const tid in byTeam) byTeam[tid].sort(sortKey);

      // Round-robin entre les equipes : on prend chaque equipe a tour de role.
      // Pour 2 equipes ca donne A0,B0,A1,B1,... (= zip parfait).
      const newOrder = [];
      const teamIds = currentTeams.map(t => t.id);
      let added = true;
      while (added) {
        added = false;
        for (const tid of teamIds) {
          const arr = byTeam[tid];
          if (arr.length) { newOrder.push(arr.shift()); added = true; }
        }
      }

      // Joueurs sans equipe : on les met a la fin
      for (const p of currentPlayers) {
        if (!newOrder.find(x => x.id === p.id)) newOrder.push(p);
      }

      const order = newOrder.map(p => p.id);
      await fetch(`/api/games/${gameId}/players/reorder`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', ...authHeaders() },
        body: JSON.stringify({ order })
      });
    }
    document.getElementById('auto-pair-btn').addEventListener('click', autoPairTeams);

    function refreshTeamSelect() {
      const sel = document.getElementById('p-team');
      const previous = sel.value;
      if (!currentTeams.length) {
        sel.innerHTML = '<option value="">(creer une equipe d\'abord)</option>';
        return;
      }
      sel.innerHTML = currentTeams.map(t => `<option value="${t.id}">${escapeHtml(t.name)} (${t.color})</option>`).join('');
      if (previous && currentTeams.find(t => String(t.id) === previous)) sel.value = previous;
    }

    document.getElementById('add-team-btn').addEventListener('click', async () => {
      const name = document.getElementById('t-name').value.trim();
      const color = document.getElementById('t-color').value;
      const err = document.getElementById('add-team-error');
      err.classList.remove('show'); err.textContent = '';
      if (!name) { showError(err, 'Nom equipe requis'); return; }
      const res = await fetch(`/api/games/${gameId}/teams`, {
        method: 'POST', headers: { 'Content-Type': 'application/json', ...authHeaders() },
        body: JSON.stringify({ name, color })
      });
      if (!res.ok) { showError(err, (await res.json()).error || 'Erreur'); return; }
      document.getElementById('t-name').value = '';
      document.getElementById('t-name').focus();
    });

    function renderPlayers(players) {
      currentPlayers = players || [];
      const div = document.getElementById('players-list');
      if (!players.length) {
        div.innerHTML = '<p class="muted" style="text-align:center;padding:14px 0">Aucun joueur dans le flight.</p>';
        return;
      }

      const isMatchplay = gameFormula && gameFormula.startsWith('match_');
      const isTeam = gameFormula === 'match_team';

      // En match_team : rendu par cards de match (au lieu de la table flat)
      if (isTeam) { renderTeamMatchCards(div, players); return; }

      const teeLbl = p => p.tee_color ? (TEE_LABELS[p.tee_color] || p.tee_color) : '-';
      const teamBadge = p => {
        if (!p.team_id) return '<span class="muted" style="font-size:11px;color:#c0392b">sans equipe</span>';
        const t = currentTeams.find(t => t.id === p.team_id);
        if (!t) return '';
        return `<span class="team-badge team-${t.color}">${escapeHtml(t.name)}</span>`;
      };
      let html = `<table>
        <thead><tr><th>${isMatchplay ? '#' : 'Joueur'}</th><th>${isMatchplay ? 'Joueur' : 'Sexe'}</th>${isTeam ? '<th>Equipe</th>' : ''}<th>Depart</th><th class="lb-score">Index</th><th class="lb-score">Jeu</th><th></th></tr></thead>
        <tbody>${players.map((p, i) => `
          <tr>
            ${isMatchplay
              ? `<td style="font-family:Georgia,serif;color:#1a4d2e;font-weight:700">${i + 1}</td><td><strong>${escapeHtml(p.name)}</strong> <span class="muted" style="font-size:11px">(${p.sex === 'M' ? 'H' : 'F'})</span></td>`
              : `<td><strong>${escapeHtml(p.name)}</strong></td><td>${p.sex === 'M' ? 'H' : 'F'}</td>`}
            ${isTeam ? `<td>${teamBadge(p)}</td>` : ''}
            <td><span class="muted" style="font-size:12px">${teeLbl(p)}</span></td>
            <td class="lb-score">${p.handicap}</td>
            <td class="lb-score"><strong>${p.playingHcp}</strong></td>
            <td style="text-align:right;white-space:nowrap">
              ${i > 0 ? `<button class="small secondary move-btn" data-move="up" data-pid="${p.id}" title="Monter" aria-label="Monter">↑</button>` : '<span style="display:inline-block;width:30px"></span>'}
              ${i < players.length - 1 ? `<button class="small secondary move-btn" data-move="down" data-pid="${p.id}" title="Descendre" aria-label="Descendre">↓</button>` : '<span style="display:inline-block;width:30px"></span>'}
              <button class="small danger" data-del="${p.id}" title="Retirer" aria-label="Retirer">×</button>
            </td>
          </tr>
        `).join('')}</tbody></table>`;

      if (isMatchplay) {
        if (players.length < 2) {
          html += `<div class="muted" style="margin-top:10px;font-size:13px;text-align:center">Ajoute au moins 2 joueurs pour voir les matchs.</div>`;
        } else if (players.length % 2 !== 0) {
          html += `<div class="error show" style="margin-top:10px">⚠️ Nombre impair de joueurs. Ajoute ou retire un joueur (matchplay = paires).</div>`;
        } else {
          const pairs = [];
          for (let i = 0; i + 1 < players.length; i += 2) pairs.push([players[i], players[i + 1]]);
          const findTeam = id => currentTeams.find(t => t.id === id);
          html += `<div style="margin-top:14px;padding:12px;background:#faf6e9;border-radius:6px;border-left:3px solid #c9a961">
            <div style="font-size:12px;text-transform:uppercase;letter-spacing:0.5px;color:#1a4d2e;font-weight:700;margin-bottom:8px">Tableau des matchs</div>
            ${pairs.map((pr, i) => {
              const sameTeam = isTeam && pr[0].team_id && pr[1].team_id && pr[0].team_id === pr[1].team_id;
              const t1 = isTeam ? findTeam(pr[0].team_id) : null;
              const t2 = isTeam ? findTeam(pr[1].team_id) : null;
              const b = (p, t) => isTeam && t ? `<span class="team-badge team-${t.color}" style="font-size:10px;padding:1px 6px">${escapeHtml(t.name)}</span>` : '';
              return `<div style="font-size:14px;margin:4px 0;color:#1a2419">
                <strong style="color:#1a4d2e">Match ${i + 1}</strong> &nbsp;${escapeHtml(pr[0].name)} ${b(pr[0], t1)} <span class="muted">vs</span> ${escapeHtml(pr[1].name)} ${b(pr[1], t2)}
                ${sameTeam ? '<div class="pair-warn">⚠️ Meme equipe — les 2 joueurs doivent etre d\'equipes differentes</div>' : ''}
              </div>`;
            }).join('')}
            <div class="muted" style="font-size:11px;margin-top:8px">💡 Utilise les flèches ↑ ↓ pour réorganiser les paires.</div>
          </div>`;
        }
      }

      div.innerHTML = html;

      div.querySelectorAll('[data-del]').forEach(b => b.addEventListener('click', async () => {
        await fetch(`/api/games/${gameId}/players/${b.dataset.del}`, { method: 'DELETE', headers: authHeaders() });
      }));

      div.querySelectorAll('[data-move]').forEach(b => b.addEventListener('click', async () => {
        await fetch(`/api/games/${gameId}/players/${b.dataset.pid}/move`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', ...authHeaders() },
          body: JSON.stringify({ direction: b.dataset.move })
        });
      }));
    }

    const TEE_LABELS = { noir: 'Noir', blanc: 'Blanc', jaune: 'Jaune', bleu: 'Bleu', rouge: 'Rouge', violet: 'Violet', orange: 'Orange', pp: 'Pitch & Putt' };
    const DEFAULT_TEE = { M: 'jaune', F: 'rouge' };

    function refreshTeeSelect() {
      const sex = document.getElementById('p-sex').value;
      const sel = document.getElementById('p-tee');
      const course = courses.find(c => c.id === selectedCourseId);
      const tees = (course && course.tees ? course.tees : []).filter(t => t.sex === sex);
      // Couleurs uniques (un parcours peut avoir plusieurs entrees pour le meme tee si bug seed)
      const seen = new Set();
      const opts = tees.filter(t => { if (seen.has(t.color)) return false; seen.add(t.color); return true; });
      const previous = sel.value;
      sel.innerHTML = opts.length
        ? opts.map(t => `<option value="${t.color}">${TEE_LABELS[t.color] || t.color}</option>`).join('')
        : '<option value="">(aucun depart configure)</option>';
      // Restore selection si possible, sinon defaut selon sexe
      const desired = (opts.find(t => t.color === previous) ? previous : DEFAULT_TEE[sex]);
      const found = opts.find(t => t.color === desired);
      sel.value = found ? found.color : (opts[0] ? opts[0].color : '');
    }

    document.getElementById('p-sex').addEventListener('change', refreshTeeSelect);

    function isNameTaken(name) {
      const norm = name.trim().toLowerCase();
      return currentPlayers.some(p => (p.name || '').trim().toLowerCase() === norm);
    }

    document.getElementById('add-btn').addEventListener('click', async () => {
      const name = document.getElementById('p-name').value.trim();
      const sex = document.getElementById('p-sex').value;
      const tee_color = document.getElementById('p-tee').value || null;
      const handicap = document.getElementById('p-hcp').value;
      const err = document.getElementById('add-error');
      err.classList.remove('show'); err.textContent = '';
      if (!name) { showError(err, 'Nom requis'); return; }
      if (isNameTaken(name)) { showError(err, `Nom deja utilise dans ce flight : ${name}`); return; }
      if (handicap === '') { showError(err, 'Index requis'); return; }
      const isTeam = gameFormula === 'match_team';
      let team_id = null;
      if (isTeam) {
        if (!currentTeams.length) { showError(err, 'Cree au moins une equipe avant d\'ajouter un joueur'); return; }
        team_id = document.getElementById('p-team').value || null;
        if (!team_id) { showError(err, 'Selectionne une equipe'); return; }
      }
      const res = await fetch(`/api/games/${gameId}/players`, {
        method: 'POST', headers: {'Content-Type': 'application/json', ...authHeaders()},
        body: JSON.stringify({ name, sex, handicap: Number(handicap), tee_color, team_id })
      });
      if (!res.ok) { showError(err, (await res.json()).error || 'Erreur'); return; }
      document.getElementById('p-name').value = '';
      document.getElementById('p-hcp').value = '';
      document.getElementById('p-name').focus();
    });

    function showError(el, msg) { el.textContent = msg; el.classList.add('show'); }

    document.getElementById('start-btn').addEventListener('click', async () => {
      const res = await fetch(`/api/games/${gameId}/start`, { method: 'POST', headers: authHeaders() });
      const data = await res.json();
      if (!res.ok) { alert(data.error || 'Erreur'); return; }
      location.href = '/game.html';
    });

    function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);}

    // ===== IMPORT JOUEURS DEPUIS EXCEL (File System Access API + SheetJS) =====
    // Stocke un handle persistant vers le fichier .xlsx dans IndexedDB.
    // Marche uniquement sur Chrome / Edge desktop (FSAA).
    const IDB_NAME = 'leaderboard-golf', IDB_STORE = 'kv';
    function idbOpen() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(IDB_NAME, 1);
        req.onupgradeneeded = () => req.result.createObjectStore(IDB_STORE);
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }
    async function idbGet(key) {
      const db = await idbOpen();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(IDB_STORE, 'readonly').objectStore(IDB_STORE).get(key);
        tx.onsuccess = () => resolve(tx.result);
        tx.onerror = () => reject(tx.error);
      });
    }
    async function idbSet(key, value) {
      const db = await idbOpen();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(IDB_STORE, 'readwrite').objectStore(IDB_STORE).put(value, key);
        tx.onsuccess = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    }

    let importFileHandle = null;

    async function refreshImportButton() {
      const btn = document.getElementById('import-btn');
      const status = document.getElementById('import-status');
      if (!('showOpenFilePicker' in window)) {
        document.getElementById('import-block').style.display = 'none';
        return;
      }
      document.getElementById('import-block').style.display = 'block';
      if (importFileHandle) {
        btn.textContent = `Importer joueurs (${importFileHandle.name})`;
        status.innerHTML = `Fichier mémorisé. <a href="#" id="reset-import" style="color:#c0392b">Reconfigurer</a>`;
        document.getElementById('reset-import').addEventListener('click', async e => {
          e.preventDefault();
          await idbSet('importFileHandle', null);
          importFileHandle = null;
          refreshImportButton();
        });
      } else {
        btn.textContent = 'Configurer fichier import Excel';
        status.textContent = 'Pointer une fois vers ton joueurs.xlsx, Chrome retient le chemin.';
      }
    }

    async function setupImportFile() {
      try {
        const [handle] = await window.showOpenFilePicker({
          types: [{ description: 'Fichier Excel', accept: { 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet': ['.xlsx'] } }],
          multiple: false,
          startIn: 'desktop'
        });
        await idbSet('importFileHandle', handle);
        importFileHandle = handle;
        refreshImportButton();
      } catch (e) {
        if (e.name !== 'AbortError') alert('Erreur : ' + e.message);
      }
    }

    async function importFromFile() {
      try {
        const perm = await importFileHandle.queryPermission({ mode: 'read' });
        if (perm !== 'granted') {
          const req = await importFileHandle.requestPermission({ mode: 'read' });
          if (req !== 'granted') { alert('Permission refusee'); return; }
        }
        const file = await importFileHandle.getFile();
        const buffer = await file.arrayBuffer();
        const wb = XLSX.read(buffer, { type: 'array' });
        showSheetPicker(wb);
      } catch (e) {
        alert('Erreur lecture fichier : ' + e.message);
      }
    }

    function showSheetPicker(wb) {
      const overlay = document.createElement('div');
      overlay.className = 'score-picker-overlay';
      overlay.innerHTML = `
        <div class="score-picker" style="width:280px">
          <div class="header">Choisir l'onglet<div class="sub">${wb.SheetNames.length} onglets disponibles</div></div>
          <div class="score-picker-list">
            ${wb.SheetNames.map(s => `<button data-sheet="${escapeHtml(s)}">${escapeHtml(s)}</button>`).join('')}
          </div>
          <button class="clear" data-cancel="1">Annuler</button>
        </div>`;
      document.body.appendChild(overlay);
      overlay.addEventListener('click', e => {
        if (e.target === overlay || (e.target.dataset && e.target.dataset.cancel)) { overlay.remove(); return; }
        const sheetName = e.target.dataset && e.target.dataset.sheet;
        if (sheetName) { overlay.remove(); processSheet(wb, sheetName); }
      });
    }

    async function processSheet(wb, sheetName) {
      const rows = XLSX.utils.sheet_to_json(wb.Sheets[sheetName], { defval: '' });
      const isTeam = gameFormula === 'match_team';
      const validColors = ['rouge','bleu','vert','jaune'];
      const validTees = ['noir','blanc','jaune','bleu','rouge','violet','orange','pp'];

      // Etape 1 : creer les equipes (Ryder uniquement)
      let teamIdByName = {};
      if (isTeam) {
        const seen = {}; // nameKey -> { name, color }
        for (const r of rows) {
          const teamName = String(r.Equipe || r.equipe || '').trim();
          const teamColor = String(r.Couleur || r.couleur || '').trim().toLowerCase();
          if (!teamName || !teamColor) continue;
          if (!validColors.includes(teamColor)) continue;
          const k = teamName.toLowerCase();
          if (!seen[k]) seen[k] = { name: teamName, color: teamColor };
        }
        // Cree celles qui n'existent pas encore
        for (const k in seen) {
          const t = seen[k];
          const existing = currentTeams.find(x => x.name.trim().toLowerCase() === k);
          if (existing) { teamIdByName[k] = existing.id; continue; }
          const res = await fetch(`/api/games/${gameId}/teams`, {
            method: 'POST', headers: { 'Content-Type': 'application/json', ...authHeaders() },
            body: JSON.stringify({ name: t.name, color: t.color })
          });
          if (res.ok) {
            const j = await res.json();
            teamIdByName[k] = j.id;
          }
        }
      }

      // Etape 2 : importer les joueurs
      let added = 0, skipped = 0, errors = [];
      for (const r of rows) {
        const name = String(r.Nom || r.nom || '').trim();
        if (!name) { skipped++; continue; }
        let sex = String(r.Sexe || r.sexe || '').trim().toUpperCase();
        if (sex === 'H') sex = 'M';
        if (sex !== 'M' && sex !== 'F') { errors.push(`${name} : sexe invalide (${sex})`); continue; }
        const handicap = Number(String(r.Index || r.index || '').replace(',', '.'));
        if (Number.isNaN(handicap)) { errors.push(`${name} : index invalide`); continue; }
        let tee_color = String(r.Tee || r.tee || '').trim().toLowerCase() || null;
        if (tee_color && !validTees.includes(tee_color)) tee_color = null;
        let team_id = null;
        if (isTeam) {
          const teamName = String(r.Equipe || r.equipe || '').trim().toLowerCase();
          team_id = teamIdByName[teamName] || null;
          if (!team_id) { errors.push(`${name} : equipe "${r.Equipe}" introuvable`); continue; }
        }
        const res = await fetch(`/api/games/${gameId}/players`, {
          method: 'POST', headers: { 'Content-Type': 'application/json', ...authHeaders() },
          body: JSON.stringify({ name, sex, handicap, tee_color, team_id })
        });
        if (res.ok) { added++; } else {
          const e = await res.json().catch(() => ({}));
          if ((e.error || '').includes('deja utilise')) skipped++;
          else errors.push(`${name} : ${e.error || 'erreur'}`);
        }
      }
      let msg = `Import termine : ${added} joueur(s) ajoute(s)`;
      if (skipped) msg += `, ${skipped} ignore(s) (doublons / vides)`;
      if (errors.length) msg += `\n\nErreurs :\n` + errors.slice(0, 10).join('\n') + (errors.length > 10 ? `\n... +${errors.length - 10} autres` : '');
      alert(msg);
    }

    document.getElementById('import-btn').addEventListener('click', async () => {
      if (!importFileHandle) { await setupImportFile(); }
      else { await importFromFile(); }
    });

    // Restore handle au chargement
    (async () => {
      try { importFileHandle = (await idbGet('importFileHandle')) || null; }
      catch (e) { importFileHandle = null; }
      refreshImportButton();
    })();

    loadCourses().then(checkExisting);
  </script>
</body>
